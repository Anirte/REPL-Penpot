<!DOCTYPE html>
<html>
<head>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: monospace; background:#1e1e2e; color:#cdd6f4; height:100vh; display:flex; flex-direction:column; }
  #output { flex:1; overflow-y:auto; padding:10px; font-size:12px; }
  .entry { margin-bottom:8px; border-bottom:1px solid #313244; padding-bottom:8px; }
  .cmd { color:#89b4fa; white-space:pre-wrap; word-break:break-all; }
  .result.ok { color:#a6e3a1; white-space:pre-wrap; word-break:break-all; }
  .result.err { color:#f38ba8; white-space:pre-wrap; word-break:break-all; }
  #input-row { border-top:1px solid #313244; padding:8px; display:flex; flex-direction:column; gap:6px; }
  #toolbar { display:flex; gap:6px; }
  textarea { width:100%; background:#313244; border:none; color:#cdd6f4; font-family:monospace; font-size:12px; padding:6px; border-radius:4px; resize:none; outline:none; height:80px; }
  button { background:#89b4fa; border:none; color:#1e1e2e; font-weight:700; padding:6px 12px; border-radius:4px; cursor:pointer; font-size:12px; }
  button.sec { background:#313244; color:#cdd6f4; }
  button:hover { opacity:.85; }
</style>
</head>
<body>
<div id="output"></div>
<div id="input-row">
  <textarea id="code" placeholder="return penpot.currentPage.name&#10;&#10;Ctrl+Enter to run"></textarea>
  <div id="toolbar">
    <button onclick="run()">▶ Run (Ctrl+Enter)</button>
    <button class="sec" onclick="clearOutput()">✕ Clear output</button>
  </div>
</div>
<script>
const outputEl = document.getElementById('output');
const codeEl   = document.getElementById('code');
const MAX_ENTRIES = 4;
let entries = [];

function addEntry(cmd, result, ok) {
  entries.push({ cmd, result, ok });
  if (entries.length > MAX_ENTRIES) entries.shift();
  render();
}

function render() {
  outputEl.innerHTML = '';
  entries.forEach(e => {
    const div = document.createElement('div');
    div.className = 'entry';
    div.innerHTML = `<div class="cmd">&gt; ${escHtml(e.cmd)}</div><div class="result ${e.ok ? 'ok' : 'err'}">${escHtml(e.result)}</div>`;
    outputEl.appendChild(div);
  });
  outputEl.scrollTop = outputEl.scrollHeight;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function clearOutput() {
  entries = [];
  render();
}

function run() {
  const c = codeEl.value.trim();
  if (!c) return;
  parent.postMessage({ type: 'EVAL', code: c }, '*');
  codeEl.value = '';
  codeEl.focus();
}

codeEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.ctrlKey) { e.preventDefault(); run(); }
});

window.addEventListener('message', e => {
  if (e.data.type === 'RESULT') {
    addEntry(e.data.cmd || '...', e.data.out, e.data.ok);
  }
});
</script>
</body>
</html>
